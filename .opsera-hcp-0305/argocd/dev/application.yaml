apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsera-hcp-0305-dev
  namespace: argocd
  labels:
    app: hcp-0305
    tenant: opsera
    environment: dev
    managed-by: opsera-c2c
spec:
  project: default
  source:
    repoURL: https://github.com/Opsera-Test/healthcp.git
    # RULE 14: ALL environments use main branch (targetRevision: main)
    targetRevision: main
    path: .opsera-hcp-0305/k8s/overlays/dev
  destination:
    # RULE: Use destination.name (NOT destination.server: kubernetes.default.svc)
    name: opsera-usw2-np
    namespace: opsera-hcp-0305-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
