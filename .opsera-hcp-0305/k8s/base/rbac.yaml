apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hcp-0305-role
  labels:
    app: hcp-0305
    tenant: opsera
# RULE 1: NO namespace field — overlays inject namespace
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hcp-0305-rolebinding
  labels:
    app: hcp-0305
    tenant: opsera
# RULE 1: NO namespace field — overlays inject namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hcp-0305-role
subjects:
  - kind: ServiceAccount
    name: hcp-0305
