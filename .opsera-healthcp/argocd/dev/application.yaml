apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsera-healthcp-dev
  namespace: argocd
  labels:
    app: healthcp
    environment: dev
    tenant: opsera
    managed-by: opsera-c2c
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Opsera-Test/healthcp.git
    # RULE 14: ALL environments use main branch (targetRevision: main)
    # Promotions update manifests on main branch - do NOT create separate branches
    targetRevision: main
    path: .opsera-healthcp/k8s/overlays/dev
  destination:
    # RULE: Use destination.name (cluster name), NEVER destination.server URL
    name: opsera-usw2-np
    namespace: opsera-healthcp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
