apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsera-healthcp-dev
  namespace: argocd
  labels:
    app: healthcp
    environment: dev
    tenant: opsera
    managed-by: opsera-c2c
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Opsera-Test/healthcp.git
    # RULE 14: ALL environments use main branch (targetRevision: main)
    targetRevision: main
    path: .opsera-healthcp/k8s/overlays/dev
  destination:
    # RULE 149: Use destination.name (NOT destination.server: https://kubernetes.default.svc)
    # RULE 217: Destination cluster must be dynamic (dev/qa/staging → np cluster)
    name: opsera-usw2-np
    namespace: opsera-healthcp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
