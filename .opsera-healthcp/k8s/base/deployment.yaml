apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcp
  labels:
    app: healthcp
    tenant: opsera
    managed-by: opsera-c2c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcp
  template:
    metadata:
      labels:
        app: healthcp
        tenant: opsera
    spec:
      serviceAccountName: healthcp
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: healthcp
          image: PLACEHOLDER_ECR_URI
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
