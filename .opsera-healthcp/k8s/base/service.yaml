apiVersion: v1
kind: Service
metadata:
  name: healthcp
  # RULE 1: NO namespace field in base (kustomize overlay injects it)
  labels:
    app: healthcp
    tenant: opsera
    managed-by: opsera-c2c
spec:
  type: ClusterIP
  selector:
    app: healthcp
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
