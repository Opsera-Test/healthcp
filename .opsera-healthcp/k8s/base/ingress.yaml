apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcp
  # RULE 1: NO namespace field in base (kustomize overlay injects it)
  labels:
    app: healthcp
    tenant: opsera
    managed-by: opsera-c2c
  annotations:
    # RULE 105: BOTH annotation AND spec.ingressClassName required
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # RULE 11: NO TLS annotations here (handled at controller level)
spec:
  # RULE 105: ingressClassName required alongside annotation
  ingressClassName: nginx
  # RULE 11: NO tls: section (wildcard cert at controller level)
  rules:
    - host: healthcp-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcp
                port:
                  number: 80
