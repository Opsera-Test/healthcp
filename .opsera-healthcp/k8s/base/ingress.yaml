apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcp
  labels:
    app: healthcp
    tenant: opsera
    managed-by: opsera-c2c
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: healthcp-placeholder.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcp
                port:
                  number: 80
# RULE 11: NO tls: section - HTTPS handled at ingress controller level
# RULE 10: Hostname pattern must be {app}-{env}.agent.opsera.dev (ONE level under domain)
# Overlays patch the hostname for each environment
