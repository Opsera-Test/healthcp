apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-healthcp-dev

resources:
  - ../../base
  - namespace.yaml
  - rbac.yaml

# RULE 106: Use labels with includeSelectors: false (NOT commonLabels)
labels:
  - pairs:
      environment: dev
      tenant: opsera
    includeSelectors: false

# RULE 2: Files from base go under patches: (prevents "already registered id" error)
patches:
  - path: ingress.yaml
    target:
      kind: Ingress
      name: healthcp

images:
  - name: PLACEHOLDER_ECR_URI
    newName: PLACEHOLDER_ECR_URI
    newTag: v1.0.0

replicas:
  - name: healthcp
    count: 1
