apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace injected here (NOT in base manifests - RULE 1)
namespace: opsera-healthcp-dev

resources:
  - ../../base         # Shared base resources
  - namespace.yaml     # Dev namespace (new resource, not in base)

# RULE 2: Files already in base MUST go under patches: (not resources:)
# This prevents "already registered id" kustomize errors
patches:
  - path: deployment.yaml
    target:
      kind: Deployment
      name: healthcp
  - path: ingress.yaml
    target:
      kind: Ingress
      name: healthcp

# RULE 9: Image transformation - CI/CD updates newName and newTag automatically
images:
  - name: PLACEHOLDER_ECR_URI
    newName: PLACEHOLDER_ECR_URI
    newTag: v1.0.0

# RULE 23: Kustomize labels with includeSelectors: false (prevents immutable selector errors)
labels:
  - pairs:
      app: healthcp
      environment: dev
      tenant: opsera
    includeSelectors: false

replicas:
  - name: healthcp
    count: 1
