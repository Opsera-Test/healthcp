apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcp
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: healthcp
          env:
            - name: ENVIRONMENT
              value: dev
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
