name: "00 - Bootstrap: Enterprise Infrastructure"

on:
  workflow_dispatch:
    inputs:
      TENANT:
        description: 'Tenant name'
        required: false
        default: 'opsera'
      APP_NAME:
        description: 'Application name'
        required: true
        default: 'healthcp'
      ENVIRONMENT:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, qa, staging, prod, all]
      AWS_REGION:
        description: 'AWS Region'
        required: false
        default: 'us-west-2'
      mode:
        description: 'Setup mode'
        required: false
        default: 'quick'
        type: choice
        options: [quick, recommended, custom]
      cloud_provider:
        description: 'Cloud provider'
        required: false
        default: 'aws'
        type: choice
        options: [aws, azure, gcp]

env:
  TENANT: ${{ inputs.TENANT || 'opsera' }}
  APP_NAME: ${{ inputs.APP_NAME || 'healthcp' }}
  AWS_REGION: ${{ inputs.AWS_REGION || 'us-west-2' }}
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  # ════════════════════════════════════════════════════════════
  # 01 - Pre-flight Checks
  # ════════════════════════════════════════════════════════════
  preflight:
    name: "01 - Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.aws_info.outputs.account_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account Info
        id: aws_info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "✅ AWS Account: ${ACCOUNT_ID}"
          echo "✅ Region: ${{ env.AWS_REGION }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Check Hub EKS Cluster
        run: |
          echo "Checking hub cluster: ${{ env.HUB_CLUSTER }}"
          aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.status' --output text
          echo "✅ Hub cluster is accessible"

      - name: Check Spoke EKS Cluster
        run: |
          echo "Checking spoke cluster: ${{ env.SPOKE_CLUSTER }}"
          aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.status' --output text
          echo "✅ Spoke cluster is accessible"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub
          echo "✅ Hub kubeconfig configured"

      - name: Check Spoke Registration in ArgoCD
        run: |
          SPOKE_REGISTERED=$(kubectl --context hub get secret -n argocd \
            -l argocd.argoproj.io/secret-type=cluster \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | \
            grep -c "${{ env.SPOKE_CLUSTER }}" || echo "0")

          if [ "$SPOKE_REGISTERED" -gt "0" ]; then
            echo "✅ Spoke cluster already registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "ℹ️  Spoke cluster not yet registered (will register in argocd-setup)"
          fi

  # ════════════════════════════════════════════════════════════
  # 02 - ECR Repositories (Idempotent)
  # ════════════════════════════════════════════════════════════
  ecr-setup:
    name: "02 - ECR Repositories"
    runs-on: ubuntu-latest
    needs: [preflight]
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.ecr_uri }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (Idempotent)
        id: ecr
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          ACCOUNT_ID=${{ needs.preflight.outputs.aws_account_id }}
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${ECR_REPO}"

          if aws ecr describe-repositories --repository-names "${ECR_REPO}" \
            --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "✅ ECR repository already exists: ${ECR_REPO}"
          else
            aws ecr create-repository \
              --repository-name "${ECR_REPO}" \
              --region ${{ env.AWS_REGION }} \
              --image-tag-mutability IMMUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags \
                Key=tenant,Value=${{ env.TENANT }} \
                Key=app,Value=${{ env.APP_NAME }} \
                Key=managed-by,Value=opsera-c2c
            echo "✅ ECR repository created: ${ECR_REPO}"
          fi

          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✅ ECR URI: ${ECR_URI}"

  # ════════════════════════════════════════════════════════════
  # 03 - ArgoCD Configuration
  # ════════════════════════════════════════════════════════════
  argocd-setup:
    name: "03 - ArgoCD Configuration"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

      - name: Register Spoke Cluster in ArgoCD (Idempotent)
        run: |
          CLUSTER_SECRET_NAME="cluster-${{ env.SPOKE_CLUSTER }}"

          if kubectl --context hub get secret "${CLUSTER_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Spoke cluster already registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "Registering spoke cluster: ${{ env.SPOKE_CLUSTER }}"

            SPOKE_SERVER=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.endpoint' --output text)
            SPOKE_CA=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.certificateAuthority.data' --output text)

            kubectl --context spoke create serviceaccount argocd-manager \
              -n kube-system --dry-run=client -o yaml | kubectl --context spoke apply -f -

            # RULE 238: Use kubectl replace --force for ClusterRoleBinding (roleRef is immutable)
            if kubectl --context spoke get clusterrolebinding argocd-manager &>/dev/null; then
              kubectl --context spoke create clusterrolebinding argocd-manager \
                --clusterrole=cluster-admin \
                --serviceaccount=kube-system:argocd-manager \
                --dry-run=client -o yaml | kubectl --context spoke replace --force -f -
            else
              kubectl --context spoke create clusterrolebinding argocd-manager \
                --clusterrole=cluster-admin \
                --serviceaccount=kube-system:argocd-manager
            fi

            TOKEN=$(kubectl --context spoke create token argocd-manager \
              -n kube-system --duration=87600h 2>/dev/null || \
              kubectl --context spoke get secret -n kube-system \
                $(kubectl --context spoke get sa argocd-manager \
                  -n kube-system -o jsonpath='{.secrets[0].name}') \
                -o jsonpath='{.data.token}' | base64 -d)

            kubectl --context hub apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${CLUSTER_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${{ env.SPOKE_CLUSTER }}"
            server: "${SPOKE_SERVER}"
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
            echo "✅ Spoke cluster registered: ${{ env.SPOKE_CLUSTER }}"
          fi

      - name: Setup ArgoCD Repository Secret (Idempotent)
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          APP_LOWER=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          REPO_SECRET_NAME="repo-${OWNER_LOWER}-${APP_LOWER}"

          if kubectl --context hub get secret "${REPO_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists: ${REPO_SECRET_NAME}"
          else
            kubectl --context hub apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/${{ github.repository }}.git
            password: ${{ secrets.GH_PAT }}
            username: git
          EOF
            echo "✅ Repository secret created: ${REPO_SECRET_NAME}"
          fi

  # ════════════════════════════════════════════════════════════
  # 04 - Kubernetes Setup
  # ════════════════════════════════════════════════════════════
  k8s-setup:
    name: "04 - Kubernetes Setup"
    runs-on: ubuntu-latest
    needs: [preflight, argocd-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

      - name: Setup Namespaces (Idempotent)
        run: |
          for ENV in dev; do
            NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

            if kubectl --context spoke get namespace "${NAMESPACE}" &>/dev/null; then
              echo "✅ Namespace already exists: ${NAMESPACE}"
            else
              kubectl --context spoke create namespace "${NAMESPACE}"
              kubectl --context spoke label namespace "${NAMESPACE}" \
                tenant=${{ env.TENANT }} \
                app=${{ env.APP_NAME }} \
                environment="${ENV}" \
                managed-by=opsera-c2c
              echo "✅ Namespace created: ${NAMESPACE}"
            fi
          done

  # ════════════════════════════════════════════════════════════
  # 05 - Verification
  # ════════════════════════════════════════════════════════════
  verify:
    name: "05 - Verification"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup, argocd-setup, k8s-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Verify All Components
        run: |
          echo "════════════════════════════════════════════════"
          echo "  BOOTSTRAP VERIFICATION SUMMARY"
          echo "════════════════════════════════════════════════"

          # Verify ECR
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "${ECR_REPO}" \
            --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ ECR Repository: ${ECR_REPO}"
          else
            echo "❌ ECR Repository missing: ${ECR_REPO}"
          fi

          # Setup kubeconfigs
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

          # Verify spoke registration
          if kubectl --context hub get secret \
            "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd &>/dev/null; then
            echo "✅ Spoke Cluster Registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "❌ Spoke Cluster NOT registered"
          fi

          # Verify namespaces
          for ENV in dev; do
            NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"
            if kubectl --context spoke get namespace "${NAMESPACE}" &>/dev/null; then
              echo "✅ Namespace: ${NAMESPACE}"
            else
              echo "❌ Namespace missing: ${NAMESPACE}"
            fi
          done

          echo ""
          echo "✅ Bootstrap complete!"
          echo "Next step: Run cicd-healthcp-dev workflow to build and deploy"
          echo "Dashboard: http://localhost:3847/mission-control?id=dep_6d335ea6e8776f085b5e7a1a"
