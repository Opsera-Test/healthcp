# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Opsera Code-to-Cloud Enterprise - Bootstrap Infrastructure                ║
# ║  App: healthcp  |  Tenant: opsera  |  Region: us-west-2                   ║
# ║                                                                            ║
# ║  Required Secrets (set via: gh secret set NAME --body "value"):            ║
# ║  - AWS_ACCESS_KEY_ID     : AWS access key for ECR and EKS                 ║
# ║  - AWS_SECRET_ACCESS_KEY : AWS secret key                                 ║
# ║  - GH_PAT                : GitHub PAT (scopes: repo, workflow)            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "00 - Bootstrap: Enterprise Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
          - all
        default: 'dev'
      force_recreate:
        description: 'Force recreate resources (dangerous!)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-west-2
  APP_NAME: healthcp
  TENANT: opsera
  DOMAIN: agent.opsera.dev
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1: PRE-FLIGHT CHECKS
  # ════════════════════════════════════════════════════════════════════════════
  preflight:
    name: "01 - Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.aws.outputs.account_id }}
      ecr_uri: ${{ steps.aws.outputs.ecr_uri }}
      hub_exists: ${{ steps.clusters.outputs.hub_exists }}
      spoke_exists: ${{ steps.clusters.outputs.spoke_exists }}
      spoke_registered: ${{ steps.check-registration.outputs.spoke_registered }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account Info
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          echo "account_id=${AWS_ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT

          echo "## 01 - Pre-flight Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AWS Account | \`${AWS_ACCOUNT_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR URI | \`${ECR_URI}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | \`${{ env.DOMAIN }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Check EKS Clusters
        id: clusters
        run: |
          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "hub_exists=true" >> $GITHUB_OUTPUT
            echo "| Hub Cluster | ✅ \`${{ env.HUB_CLUSTER }}\` exists |" >> $GITHUB_STEP_SUMMARY
          else
            echo "hub_exists=false" >> $GITHUB_OUTPUT
            echo "| Hub Cluster | ❌ \`${{ env.HUB_CLUSTER }}\` not found |" >> $GITHUB_STEP_SUMMARY
          fi

          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "spoke_exists=true" >> $GITHUB_OUTPUT
            echo "| Spoke Cluster | ✅ \`${{ env.SPOKE_CLUSTER }}\` exists |" >> $GITHUB_STEP_SUMMARY
          else
            echo "spoke_exists=false" >> $GITHUB_OUTPUT
            echo "| Spoke Cluster | ❌ \`${{ env.SPOKE_CLUSTER }}\` not found |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Check Spoke Registration in ArgoCD
        id: check-registration
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

          if kubectl --context hub get secret "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd &>/dev/null; then
            echo "spoke_registered=true" >> $GITHUB_OUTPUT
            echo "| Spoke in ArgoCD | ✅ Already Registered |" >> $GITHUB_STEP_SUMMARY
          else
            echo "spoke_registered=false" >> $GITHUB_OUTPUT
            echo "| Spoke in ArgoCD | ⚠️ Not registered |" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2: ECR REPOSITORIES (Idempotent)
  # ════════════════════════════════════════════════════════════════════════════
  ecr-setup:
    name: "02 - ECR Repositories"
    runs-on: ubuntu-latest
    needs: [preflight]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (Idempotent)
        run: |
          echo "## 02 - ECR Repository Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

          REPO_NAME="${{ env.APP_NAME }}"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" &>/dev/null; then
            echo "| \`${REPO_NAME}\` | ✅ Already exists |" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --image-tag-mutability MUTABLE
            echo "| \`${REPO_NAME}\` | 🆕 Created |" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3: ARGOCD SETUP (Hub-Spoke Configuration)
  # ════════════════════════════════════════════════════════════════════════════
  argocd-setup:
    name: "03 - ArgoCD Configuration"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup]
    if: needs.preflight.outputs.hub_exists == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Register Spoke Cluster in ArgoCD (Idempotent)
        if: needs.preflight.outputs.spoke_exists == 'true' && needs.preflight.outputs.spoke_registered != 'true'
        run: |
          echo "## 03 - Cluster Registration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.certificateAuthority.data' --output text)

          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

          kubectl --context spoke create namespace argocd-manager 2>/dev/null || true

          cat <<EOF | kubectl --context spoke apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: argocd-manager
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: argocd-manager
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token
          EOF

          # RULE 238: ClusterRoleBinding.roleRef is immutable - use replace --force
          cat <<EOF | kubectl --context spoke replace --force -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-role-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: argocd-manager
          EOF

          sleep 5
          SA_TOKEN=$(kubectl --context spoke get secret argocd-manager-token -n argocd-manager -o jsonpath='{.data.token}' | base64 -d)

          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

          SPOKE_CLUSTER_LOWER=$(echo "${{ env.SPOKE_CLUSTER }}" | tr '[:upper:]' '[:lower:]')
          CLUSTER_SECRET_NAME="cluster-${SPOKE_CLUSTER_LOWER}"

          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${CLUSTER_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${SPOKE_CLUSTER_LOWER}"
            server: "${SPOKE_ENDPOINT}"
            config: |
              {
                "bearerToken": "${SA_TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF

          echo "| Cluster \`${{ env.SPOKE_CLUSTER }}\` | 🆕 Registered in ArgoCD |" >> $GITHUB_STEP_SUMMARY

      - name: Spoke Already Registered
        if: needs.preflight.outputs.spoke_registered == 'true'
        run: |
          echo "## 03 - Cluster Registration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster \`${{ env.SPOKE_CLUSTER }}\` | ✅ Already Registered (Skipped) |" >> $GITHUB_STEP_SUMMARY

      - name: Setup ArgoCD Repository Secret (Idempotent)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          APP_NAME_LOWER=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          SECRET_NAME="repo-${APP_NAME_LOWER}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Repository Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if kubectl --context hub get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "| Repository Secret | ✅ Already exists |" >> $GITHUB_STEP_SUMMARY
          else
            if [ -z "$GH_PAT" ]; then
              echo "| Repository Secret | ❌ FAILED - GH_PAT not provided |" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            kubectl create secret generic "$SECRET_NAME" \
              --namespace=argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=password="$GH_PAT" \
              --from-literal=username="git" \
              --dry-run=client -o yaml | kubectl --context hub apply -f -

            kubectl --context hub label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository --overwrite

            echo "| Repository Secret | 🆕 Created |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Repository URL | \`$REPO_URL\` |" >> $GITHUB_STEP_SUMMARY

      - name: Setup ArgoCD Applications (Idempotent)
        run: |
          ENVS="${{ github.event.inputs.environment }}"
          [ "$ENVS" = "all" ] && ENVS="dev qa staging prod"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ArgoCD Applications" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Application | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------------|--------|" >> $GITHUB_STEP_SUMMARY

          for ENV in $ENVS; do
            APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

            if kubectl --context hub get application "$APP_FULL_NAME" -n argocd &>/dev/null; then
              echo "| ${ENV} | \`${APP_FULL_NAME}\` | ✅ Already exists |" >> $GITHUB_STEP_SUMMARY
            else
              MANIFEST=".opsera-${{ env.APP_NAME }}/argocd/${ENV}/application.yaml"
              if [ -f "$MANIFEST" ]; then
                kubectl --context hub apply -f "$MANIFEST"
                echo "| ${ENV} | \`${APP_FULL_NAME}\` | 🆕 Created |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| ${ENV} | \`${APP_FULL_NAME}\` | ⚠️ Manifest not found: $MANIFEST |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 4: KUBERNETES NAMESPACES (Idempotent)
  # ════════════════════════════════════════════════════════════════════════════
  k8s-setup:
    name: "04 - Kubernetes Setup"
    runs-on: ubuntu-latest
    needs: [preflight, argocd-setup]
    if: needs.preflight.outputs.spoke_exists == 'true'

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to Spoke Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Setup Namespaces (Idempotent)
        run: |
          ENVS="${{ github.event.inputs.environment }}"
          [ "$ENVS" = "all" ] && ENVS="dev qa staging prod"

          echo "## 04 - Kubernetes Namespaces" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          for ENV in $ENVS; do
            NS="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

            if kubectl --context spoke get namespace "$NS" &>/dev/null; then
              echo "| \`${NS}\` | ✅ Already exists |" >> $GITHUB_STEP_SUMMARY
            else
              kubectl --context spoke create namespace "$NS"
              kubectl --context spoke label namespace "$NS" \
                tenant=${{ env.TENANT }} \
                app=${{ env.APP_NAME }} \
                environment=${ENV} \
                managed-by=opsera-c2c
              echo "| \`${NS}\` | 🆕 Created |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 5: VERIFICATION
  # ════════════════════════════════════════════════════════════════════════════
  verify:
    name: "05 - Verification"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup, argocd-setup, k8s-setup]
    if: always()

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Verify All Components
        run: |
          echo "## 05 - Bootstrap Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if aws ecr describe-repositories --repository-names "${{ env.APP_NAME }}" &>/dev/null; then
            echo "| ECR Repository | ✅ Ready |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ECR Repository | ❌ Not found |" >> $GITHUB_STEP_SUMMARY
          fi

          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} &>/dev/null; then
            aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub
            APP_COUNT=$(kubectl --context hub get applications -n argocd -o name 2>/dev/null | grep "${{ env.APP_NAME }}" | wc -l || echo 0)
            echo "| ArgoCD Applications | ✅ ${APP_COUNT} found |" >> $GITHUB_STEP_SUMMARY

            SPOKE_LOWER=$(echo "${{ env.SPOKE_CLUSTER }}" | tr '[:upper:]' '[:lower:]')
            if kubectl --context hub get secret "cluster-${SPOKE_LOWER}" -n argocd &>/dev/null; then
              echo "| Spoke Registration | ✅ \`${{ env.SPOKE_CLUSTER }}\` registered |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Spoke Registration | ❌ Not registered |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} &>/dev/null; then
            aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke
            NS_COUNT=$(kubectl --context spoke get namespaces -l app=${{ env.APP_NAME }} -o name 2>/dev/null | wc -l || echo 0)
            echo "| K8s Namespaces | ✅ ${NS_COUNT} found |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Run **CI/CD Pipeline** to build and deploy the first image" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor: \`kubectl get app opsera-healthcp-dev -n argocd --context hub\`" >> $GITHUB_STEP_SUMMARY
