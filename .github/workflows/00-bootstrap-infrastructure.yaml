name: "00 - Bootstrap: hcp-0305 Infrastructure"
# Opsera Code-to-Cloud Enterprise v0.934
# ONE-TIME infrastructure setup — run before first CI/CD deployment
# Re-runnable (all operations are idempotent)

on:
  workflow_dispatch:
    inputs:
      TENANT:
        description: 'Tenant name'
        required: false
        default: 'opsera'
      APP_NAME:
        description: 'Application name'
        required: false
        default: 'hcp-0305'
      ENVIRONMENT:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, qa, staging, prod]
      AWS_REGION:
        description: 'AWS Region'
        required: false
        default: 'us-west-2'
      mode:
        description: 'Setup mode'
        required: false
        default: 'quick'
      cloud_provider:
        description: 'Cloud provider'
        required: false
        default: 'aws'

permissions:
  contents: write
  id-token: write

env:
  TENANT: ${{ github.event.inputs.TENANT || 'opsera' }}
  APP_NAME: ${{ github.event.inputs.APP_NAME || 'hcp-0305' }}
  ENVIRONMENT: ${{ github.event.inputs.ENVIRONMENT || 'dev' }}
  AWS_REGION: ${{ github.event.inputs.AWS_REGION || 'us-west-2' }}
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Pre-flight Checks
  # ──────────────────────────────────────────────────────────────
  preflight:
    name: "01 - Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.aws-account.outputs.account_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "✅ AWS Account: ${ACCOUNT_ID}"

      - name: Check EKS Clusters
        run: |
          echo "Checking hub cluster: ${{ env.HUB_CLUSTER }}"
          HUB_STATUS=$(aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} --query 'cluster.status' --output text)
          echo "  Hub status: ${HUB_STATUS}"

          echo "Checking spoke cluster: ${{ env.SPOKE_CLUSTER }}"
          SPOKE_STATUS=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} --query 'cluster.status' --output text)
          echo "  Spoke status: ${SPOKE_STATUS}"

          if [ "${HUB_STATUS}" != "ACTIVE" ] || [ "${SPOKE_STATUS}" != "ACTIVE" ]; then
            echo "❌ One or more clusters are not ACTIVE"
            exit 1
          fi
          echo "✅ Both clusters verified"

  # ──────────────────────────────────────────────────────────────
  # Job 2: ECR Repositories
  # ──────────────────────────────────────────────────────────────
  ecr-setup:
    name: "02 - ECR Repositories"
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        run: |
          ECR_REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"

          if aws ecr describe-repositories --repository-names "${ECR_REPO_NAME}" \
            --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ ECR repository already exists: ${ECR_REPO_NAME}"
          else
            aws ecr create-repository \
              --repository-name "${ECR_REPO_NAME}" \
              --image-tag-mutability IMMUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${{ env.TENANT }} \
                     Key=app,Value=${{ env.APP_NAME }} \
                     Key=managed-by,Value=opsera-c2c \
              --region ${{ env.AWS_REGION }}
            echo "✅ ECR repository created: ${ECR_REPO_NAME}"
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 3: ArgoCD Configuration
  # ──────────────────────────────────────────────────────────────
  argocd-setup:
    name: "03 - ArgoCD Configuration"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub
          echo "✅ Hub kubeconfig configured"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke
          echo "✅ Spoke kubeconfig configured"

      - name: Register Spoke Cluster in ArgoCD
        run: |
          CLUSTER_SECRET_NAME="cluster-${{ env.SPOKE_CLUSTER }}"

          if kubectl --context hub get secret "${CLUSTER_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Spoke cluster already registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "Registering spoke cluster: ${{ env.SPOKE_CLUSTER }}"

            SPOKE_SERVER=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.endpoint' --output text)
            SPOKE_CA=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.certificateAuthority.data' --output text)

            # Create ArgoCD manager service account on spoke
            kubectl --context spoke create serviceaccount argocd-manager \
              -n kube-system --dry-run=client -o yaml | \
              kubectl --context spoke apply -f -

            # RULE 238: ClusterRoleBinding roleRef is immutable — use replace --force
            kubectl --context spoke create clusterrolebinding argocd-manager \
              --clusterrole=cluster-admin \
              --serviceaccount=kube-system:argocd-manager \
              --dry-run=client -o yaml | kubectl --context spoke replace --force -f - 2>/dev/null || \
            kubectl --context spoke create clusterrolebinding argocd-manager \
              --clusterrole=cluster-admin \
              --serviceaccount=kube-system:argocd-manager \
              --dry-run=client -o yaml | kubectl --context spoke apply -f -

            # Create token (K8s 1.24+ compatible, 10-year expiration)
            TOKEN=$(kubectl --context spoke create token argocd-manager \
              -n kube-system --duration=87600h)

            cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${CLUSTER_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${{ env.SPOKE_CLUSTER }}"
            server: "${SPOKE_SERVER}"
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
            echo "✅ Spoke cluster registered: ${{ env.SPOKE_CLUSTER }}"
          fi

      - name: Setup ArgoCD Repository Secret
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          APP_LOWER=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          REPO_SECRET_NAME="repo-${OWNER_LOWER}-${APP_LOWER}"

          if kubectl --context hub get secret "${REPO_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists: ${REPO_SECRET_NAME}"
          else
            cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/${{ github.repository }}.git
            password: ${{ secrets.GH_PAT }}
            username: git
          EOF
            echo "✅ Repository registered with ArgoCD: ${{ github.repository }}"
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 4: Kubernetes Setup
  # ──────────────────────────────────────────────────────────────
  k8s-setup:
    name: "04 - Kubernetes Setup"
    runs-on: ubuntu-latest
    needs: [preflight, argocd-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Setup Namespaces
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-dev"

          if kubectl get namespace "${NAMESPACE}" &>/dev/null; then
            echo "✅ Namespace already exists: ${NAMESPACE}"
          else
            kubectl create namespace "${NAMESPACE}"
            kubectl label namespace "${NAMESPACE}" \
              tenant=${{ env.TENANT }} \
              app=${{ env.APP_NAME }} \
              environment=dev \
              managed-by=opsera-c2c
            echo "✅ Namespace created: ${NAMESPACE}"
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 5: Verification
  # ──────────────────────────────────────────────────────────────
  verify:
    name: "05 - Verification"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup, argocd-setup, k8s-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

      - name: Verify ECR Repository
        run: |
          ECR_REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          ECR_URI=$(aws ecr describe-repositories \
            --repository-names "${ECR_REPO_NAME}" \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' --output text)
          echo "✅ ECR repository: ${ECR_URI}"

      - name: Verify Namespaces
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-dev"
          kubectl --context spoke get namespace "${NAMESPACE}"
          echo "✅ Namespace verified: ${NAMESPACE}"

      - name: Verify ArgoCD Cluster Registration
        run: |
          kubectl --context hub get secret \
            "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd
          echo "✅ Spoke cluster registered in ArgoCD"

      - name: Verify ArgoCD Repository Registration
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          APP_LOWER=$(echo "${{ env.APP_NAME }}" | tr '[:upper:]' '[:lower:]')
          REPO_SECRET_NAME="repo-${OWNER_LOWER}-${APP_LOWER}"
          kubectl --context hub get secret "${REPO_SECRET_NAME}" -n argocd
          echo "✅ Repository registered with ArgoCD"

      - name: Show Bootstrap Summary
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║       Bootstrap Complete — hcp-0305                     ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  AWS Account:   ${ACCOUNT_ID}"
          echo "║  ECR Repo:      ${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${ECR_REPO_NAME}"
          echo "║  Hub Cluster:   ${{ env.HUB_CLUSTER }}"
          echo "║  Spoke Cluster: ${{ env.SPOKE_CLUSTER }}"
          echo "║  Namespace:     ${{ env.TENANT }}-${{ env.APP_NAME }}-dev"
          echo "║  Ingress URL:   https://hcp-0305-dev.agent.opsera.dev"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Next: gh workflow run '2-ci-hcp-0305-dev.yaml'         ║"
          echo "╚══════════════════════════════════════════════════════════╝"
