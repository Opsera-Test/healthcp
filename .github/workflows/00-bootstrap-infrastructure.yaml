name: "00 - Bootstrap: Enterprise Infrastructure"

on:
  workflow_dispatch:
    inputs:
      TENANT:
        description: "Tenant name"
        required: false
        default: "opsera"
      APP_NAME:
        description: "Application name"
        required: false
        default: "healthcp"
      ENVIRONMENT:
        description: "Target environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
          - all
      AWS_REGION:
        description: "AWS Region"
        required: false
        default: "us-west-2"
      mode:
        description: "Setup mode (quick/recommended/custom)"
        required: false
        default: "quick"
      cloud_provider:
        description: "Cloud provider (aws/azure/gcp)"
        required: false
        default: "aws"

env:
  TENANT: ${{ inputs.TENANT || 'opsera' }}
  APP_NAME: ${{ inputs.APP_NAME || 'healthcp' }}
  AWS_REGION: ${{ inputs.AWS_REGION || 'us-west-2' }}
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: write
  id-token: write

jobs:
  # Job 1: Pre-flight Checks
  preflight:
    name: "01 - Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.get-account.outputs.account_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account Info
        id: get-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "✅ AWS Account: ${ACCOUNT_ID}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Check EKS Clusters
        run: |
          echo "Checking hub cluster: ${{ env.HUB_CLUSTER }}"
          aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.status' --output text || echo "⚠️  Hub cluster check failed"

          echo "Checking spoke cluster: ${{ env.SPOKE_CLUSTER }}"
          aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} \
            --query 'cluster.status' --output text || echo "⚠️  Spoke cluster check failed"

      - name: Check Spoke Registration in ArgoCD
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub
          if kubectl --context hub get secret cluster-${{ env.SPOKE_CLUSTER }} -n argocd &>/dev/null; then
            echo "✅ Spoke cluster already registered in ArgoCD"
          else
            echo "ℹ️  Spoke cluster not yet registered - will register in argocd-setup job"
          fi

  # Job 2: ECR Repositories
  ecr-setup:
    name: "02 - ECR Repositories"
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (Idempotent)
        run: |
          ECR_REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"

          if aws ecr describe-repositories --repository-names "${ECR_REPO_NAME}" \
              --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ ECR repository already exists: ${ECR_REPO_NAME}"
          else
            aws ecr create-repository \
              --repository-name "${ECR_REPO_NAME}" \
              --image-tag-mutability MUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${{ env.TENANT }} \
                     Key=app,Value=${{ env.APP_NAME }} \
                     Key=managed-by,Value=opsera-c2c \
              --region ${{ env.AWS_REGION }}
            echo "✅ ECR repository created: ${ECR_REPO_NAME}"
          fi

  # Job 3: ArgoCD Configuration
  argocd-setup:
    name: "03 - ArgoCD Configuration"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Connect to Hub Cluster
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub
          echo "✅ Connected to hub cluster: ${{ env.HUB_CLUSTER }}"

      - name: Register Spoke Cluster in ArgoCD (Idempotent)
        run: |
          CLUSTER_SECRET_NAME="cluster-${{ env.SPOKE_CLUSTER }}"

          if kubectl --context hub get secret "${CLUSTER_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Spoke cluster already registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "Registering spoke cluster: ${{ env.SPOKE_CLUSTER }}"
            aws eks update-kubeconfig \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --alias spoke

            SPOKE_SERVER=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.endpoint' --output text)
            SPOKE_CA=$(aws eks describe-cluster \
              --name ${{ env.SPOKE_CLUSTER }} \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.certificateAuthority.data' --output text)

            kubectl --context spoke create serviceaccount argocd-manager -n kube-system \
              --dry-run=client -o yaml | kubectl --context spoke apply -f -
            kubectl --context spoke create clusterrolebinding argocd-manager \
              --clusterrole=cluster-admin \
              --serviceaccount=kube-system:argocd-manager \
              --dry-run=client -o yaml | kubectl --context spoke apply -f - || \
              kubectl --context spoke replace --force -f - <<EOF
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system
          EOF

            TOKEN=$(kubectl --context spoke create token argocd-manager \
              -n kube-system --duration=87600h 2>/dev/null || \
              kubectl --context spoke get secret -n kube-system \
              $(kubectl --context spoke get sa argocd-manager -n kube-system \
                -o jsonpath='{.secrets[0].name}') \
              -o jsonpath='{.data.token}' | base64 -d)

            kubectl --context hub apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${CLUSTER_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${{ env.SPOKE_CLUSTER }}"
            server: "${SPOKE_SERVER}"
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF

            echo "✅ Spoke cluster registered: ${{ env.SPOKE_CLUSTER }}"
          fi

      - name: Setup ArgoCD Repository Secret (Idempotent)
        run: |
          GITHUB_REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_SECRET_NAME="repo-${GITHUB_REPO_LOWER}-${{ env.APP_NAME }}"

          if kubectl --context hub get secret "${REPO_SECRET_NAME}" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists"
          else
            kubectl --context hub apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/${{ github.repository }}.git
            password: ${{ secrets.GH_PAT }}
            username: git
          EOF
            echo "✅ Repository secret created"
          fi

  # Job 4: Kubernetes Setup
  k8s-setup:
    name: "04 - Kubernetes Setup"
    runs-on: ubuntu-latest
    needs: [preflight, argocd-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Connect to Spoke Cluster
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

      - name: Setup Namespaces (Idempotent)
        run: |
          for ENV in dev; do
            NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

            if kubectl --context spoke get namespace "${NAMESPACE}" &>/dev/null; then
              echo "✅ Namespace already exists: ${NAMESPACE}"
            else
              kubectl --context spoke create namespace "${NAMESPACE}"
              kubectl --context spoke label namespace "${NAMESPACE}" \
                tenant=${{ env.TENANT }} \
                app=${{ env.APP_NAME }} \
                environment=${ENV} \
                managed-by=opsera-c2c
              echo "✅ Namespace created: ${NAMESPACE}"
            fi
          done

  # Job 5: Verification
  verify:
    name: "05 - Verification"
    runs-on: ubuntu-latest
    needs: [preflight, ecr-setup, argocd-setup, k8s-setup]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Verify All Components
        run: |
          echo "=== Verification Report ==="

          # Verify ECR
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "${ECR_REPO}" \
              --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ ECR: ${ECR_REPO}"
          else
            echo "❌ ECR repository missing: ${ECR_REPO}"
          fi

          # Verify Hub cluster connectivity
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias hub

          # Verify Spoke registration
          if kubectl --context hub get secret \
              cluster-${{ env.SPOKE_CLUSTER }} -n argocd &>/dev/null; then
            echo "✅ Spoke cluster registered: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "⚠️  Spoke cluster not registered yet"
          fi

          # Verify Spoke namespaces
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --alias spoke

          for ENV in dev; do
            NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"
            if kubectl --context spoke get namespace "${NAMESPACE}" &>/dev/null; then
              echo "✅ Namespace: ${NAMESPACE}"
            else
              echo "⚠️  Namespace not found: ${NAMESPACE}"
            fi
          done

          echo ""
          echo "=== Bootstrap Complete ==="
          echo "Next step: Run cicd-healthcp-dev.yaml to deploy your first image"
