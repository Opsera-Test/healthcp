# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Opsera Code-to-Cloud Enterprise - CI/CD Pipeline v2.4                    ║
# ║  App: healthcp  |  Env: dev  |  Strategy: Rolling                         ║
# ║                                                                            ║
# ║  Required Secrets (set via: gh secret set NAME --body "value"):            ║
# ║  - AWS_ACCESS_KEY_ID     : AWS access key for ECR and EKS                 ║
# ║  - AWS_SECRET_ACCESS_KEY : AWS secret key                                 ║
# ║  - GH_PAT                : GitHub PAT (scopes: repo, workflow)            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "CI/CD healthcp dev"

on:
  push:
    branches: [main]
    # RULE-234: Smart CI/CD triggers - only code changes trigger pipeline
    paths:
      - '.opsera-healthcp/**'
      - '!.opsera-healthcp/k8s/**'
      - '!.opsera-healthcp/argocd/**'
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'vite.config.ts'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/2-ci-healthcp-dev.yaml'
  workflow_dispatch:
    inputs:
      TENANT:
        description: 'Tenant name'
        required: false
        default: 'opsera'
      APP_NAME:
        description: 'Application name'
        required: false
        default: 'healthcp'
      ENVIRONMENT:
        description: 'Target environment'
        required: false
        default: 'dev'
      AWS_REGION:
        description: 'AWS Region'
        required: false
        default: 'us-west-2'

# Prevent duplicate runs
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  TENANT: ${{ github.event.inputs.TENANT || 'opsera' }}
  APP_NAME: ${{ github.event.inputs.APP_NAME || 'healthcp' }}
  ENVIRONMENT: ${{ github.event.inputs.ENVIRONMENT || 'dev' }}
  AWS_REGION: ${{ github.event.inputs.AWS_REGION || 'us-west-2' }}
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ARGOCD_SERVER: argocd-usw2.agent.opsera.dev

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1: PREREQUISITES CHECK
  # ════════════════════════════════════════════════════════════════════════════
  check-bootstrap-prerequisites:
    name: Check Bootstrap Prerequisites
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR Repository
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.APP_NAME }}" &>/dev/null; then
            echo "❌ ECR repository '${{ env.APP_NAME }}' not found."
            echo "Run the bootstrap workflow first: 00-bootstrap-infrastructure.yaml"
            exit 1
          fi
          echo "✅ ECR repository exists: ${{ env.APP_NAME }}"

      - name: Verify EKS Clusters
        run: |
          if ! aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "❌ Spoke cluster '${{ env.SPOKE_CLUSTER }}' not found."
            echo "Run the bootstrap workflow first: 00-bootstrap-infrastructure.yaml"
            exit 1
          fi
          echo "✅ Spoke cluster ready: ${{ env.SPOKE_CLUSTER }}"

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2: SECURITY SCAN (parallel with build)
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: Run Gitleaks Security Scan
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    continue-on-error: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Security Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3: BUILD IMAGE (parallel with security scan)
  # ════════════════════════════════════════════════════════════════════════════
  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.aws-account.outputs.ecr_registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "account_id=${AWS_ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${{ env.ENVIRONMENT }}-${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated image tag: ${IMAGE_TAG}"

      - name: Build Docker Image
        run: |
          ECR_REGISTRY="${{ steps.aws-account.outputs.ecr_registry }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.APP_NAME }}:${IMAGE_TAG}"

          # RULE 7: Build context MUST be . (repo root), Dockerfile in .opsera-{APP}/
          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t "${IMAGE_URI}" \
            .

          echo "✅ Built: ${IMAGE_URI}"

      - name: Save Image Artifact
        run: |
          ECR_REGISTRY="${{ steps.aws-account.outputs.ecr_registry }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.APP_NAME }}:${IMAGE_TAG}"

          docker save "${IMAGE_URI}" | gzip > /tmp/image.tar.gz
          echo "Image saved to artifact"

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.image_tag }}
          path: /tmp/image.tar.gz
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 4: GRYPE VULNERABILITY SCAN
  # ════════════════════════════════════════════════════════════════════════════
  grype-scan:
    name: Run Grype Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build-image.outputs.image_tag }}
          path: /tmp

      - name: Load Image Artifact
        run: |
          docker load < /tmp/image.tar.gz
          echo "✅ Image loaded for scanning"

      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v3
        id: grype
        with:
          image: "${{ needs.build-image.outputs.ecr_registry }}/${{ env.APP_NAME }}:${{ needs.build-image.outputs.image_tag }}"
          fail-build: false
          severity-cutoff: critical
          output-format: table

      - name: Upload Grype Results SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 5: PUSH TO ECR
  # ════════════════════════════════════════════════════════════════════════════
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      image_tag: ${{ needs.build-image.outputs.image_tag }}
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build-image.outputs.image_tag }}
          path: /tmp

      - name: Load and Push to ECR
        id: push
        run: |
          ECR_REGISTRY="${{ needs.build-image.outputs.ecr_registry }}"
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"
          ECR_URI="${ECR_REGISTRY}/${{ env.APP_NAME }}:${IMAGE_TAG}"

          docker load < /tmp/image.tar.gz

          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

          docker push "${ECR_URI}"

          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✅ Pushed: ${ECR_URI}"

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 6: UPDATE KUSTOMIZE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: Update Kustomize Manifests
    runs-on: ubuntu-latest
    needs: [push-to-ecr]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Kustomization Image
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag }}"
          NEW_NAME="${ECR_REGISTRY}/${{ env.APP_NAME }}"
          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENVIRONMENT }}"

          yq eval -i ".images[0].newName = \"${NEW_NAME}\"" "${OVERLAY_PATH}/kustomization.yaml"
          yq eval -i ".images[0].newTag = \"${IMAGE_TAG}\"" "${OVERLAY_PATH}/kustomization.yaml"

          echo "✅ Updated kustomization.yaml:"
          echo "   newName: ${NEW_NAME}"
          echo "   newTag:  ${IMAGE_TAG}"

      - name: Validate Kustomize Build
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENVIRONMENT }}"
          if ! kustomize build "${OVERLAY_PATH}" > /dev/null 2>&1; then
            echo "❌ Kustomize build validation failed!"
            kustomize build "${OVERLAY_PATH}"
            exit 1
          fi
          echo "✅ Kustomize build validation passed"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Changes
        run: |
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag }}"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "chore: deploy healthcp ${IMAGE_TAG} to ${{ env.ENVIRONMENT }} [skip ci]"

          for i in {1..3}; do
            if git push origin ${{ github.ref_name }}; then
              echo "✅ Pushed successfully"
              exit 0
            fi
            echo "Push failed, retrying... ($i/3)"
            if ! git pull --rebase origin ${{ github.ref_name }}; then
              git rebase --abort || true
              git pull --no-rebase origin ${{ github.ref_name }}
            fi
            sleep 2
          done
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 7: CREATE ARGOCD APPLICATION
  # ════════════════════════════════════════════════════════════════════════════
  create-argocd-app:
    name: Create ArgoCD Application
    runs-on: ubuntu-latest
    needs: [update-manifests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Apply ArgoCD Application
        run: |
          APP_MANIFEST=".opsera-${{ env.APP_NAME }}/argocd/${{ env.ENVIRONMENT }}/application.yaml"

          if [ ! -f "$APP_MANIFEST" ]; then
            echo "❌ ArgoCD application manifest not found: $APP_MANIFEST"
            exit 1
          fi

          kubectl --context hub apply -f "$APP_MANIFEST"
          echo "✅ ArgoCD application created/updated"

          ARGOCD_APP_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"
          for i in {1..12}; do
            if kubectl --context hub get application "${ARGOCD_APP_NAME}" -n argocd &>/dev/null; then
              echo "✅ ArgoCD application exists: ${ARGOCD_APP_NAME}"
              break
            fi
            echo "⏳ Waiting for application... ($i/12)"
            sleep 5
          done

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 8: REFRESH ECR SECRET (SPOKE)
  # ════════════════════════════════════════════════════════════════════════════
  refresh-ecr-secret:
    name: Refresh ECR Registry Secret
    runs-on: ubuntu-latest
    needs: [create-argocd-app]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Refresh ECR Secret
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          kubectl --context spoke create secret docker-registry ecr-registry-secret \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace="${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✅ ECR secret refreshed in namespace: ${NAMESPACE}"

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 9: ARGOCD HARD REFRESH (HUB)
  # ════════════════════════════════════════════════════════════════════════════
  argocd-refresh:
    name: Run ArgoCD Hard Refresh
    runs-on: ubuntu-latest
    needs: [create-argocd-app]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Run ArgoCD Hard Refresh
        run: |
          ARGOCD_APP_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          kubectl --context hub patch application "${ARGOCD_APP_NAME}" -n argocd --type merge \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'

          echo "✅ Hard refresh triggered for: ${ARGOCD_APP_NAME}"
          sleep 5

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 10: ARGOCD SYNC (HUB)
  # ════════════════════════════════════════════════════════════════════════════
  argocd-sync:
    name: Run ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [argocd-refresh]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Run ArgoCD Sync
        run: |
          ARGOCD_APP_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          kubectl --context hub patch application "${ARGOCD_APP_NAME}" -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD","force":true}}}'

          echo "✅ Sync triggered for: ${ARGOCD_APP_NAME}"

      - name: Wait for Sync Completion
        run: |
          ARGOCD_APP_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          for i in $(seq 1 60); do
            # RULE 13: Check operationState.phase (NOT sync.status) to avoid false negatives
            HEALTH=$(kubectl --context hub get application "${ARGOCD_APP_NAME}" -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            OPERATION=$(kubectl --context hub get application "${ARGOCD_APP_NAME}" -n argocd \
              -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "Unknown")

            echo "[$i/60] Health: ${HEALTH}, Operation: ${OPERATION}"

            if [ "$HEALTH" = "Healthy" ] && [ "$OPERATION" = "Succeeded" ]; then
              echo "✅ ArgoCD sync operation completed successfully"
              exit 0
            fi

            if [ "$OPERATION" = "Failed" ] || [ "$OPERATION" = "Error" ]; then
              echo "❌ ArgoCD sync failed with operation: ${OPERATION}"
              kubectl --context hub get application "${ARGOCD_APP_NAME}" -n argocd -o yaml | tail -50
              exit 1
            fi

            sleep 10
          done

          echo "⚠️ Sync did not complete in 10 minutes"
          kubectl --context hub get application "${ARGOCD_APP_NAME}" -n argocd -o yaml | tail -50
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 11: VERIFY DEPLOYMENT (SPOKE)
  # ════════════════════════════════════════════════════════════════════════════
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [argocd-sync]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Wait for Deployment to Exist
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          for i in {1..60}; do
            if kubectl --context spoke get deployment ${{ env.APP_NAME }} -n "${NAMESPACE}" &>/dev/null; then
              echo "✅ Deployment exists"
              break
            fi
            echo "⏳ Waiting for ArgoCD to create deployment... ($i/60)"
            sleep 5
          done

          if ! kubectl --context spoke get deployment ${{ env.APP_NAME }} -n "${NAMESPACE}" &>/dev/null; then
            echo "❌ Deployment not found after 5 minutes"
            exit 1
          fi

      - name: Verify Pods Running
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"

          kubectl --context spoke wait --for=condition=available --timeout=300s \
            deployment/${{ env.APP_NAME }} -n "${NAMESPACE}"

          kubectl --context spoke get pods -n "${NAMESPACE}" -o wide

          RUNNING=$(kubectl --context spoke get pods -n "${NAMESPACE}" \
            --field-selector=status.phase=Running -o name | wc -l)

          if [ "$RUNNING" -eq 0 ]; then
            echo "❌ No pods are running"
            exit 1
          fi
          echo "✅ ${RUNNING} pod(s) running"

      - name: Show Deployment Summary
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag }}"

          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`${{ env.APP_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.ENVIRONMENT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${NAMESPACE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${IMAGE_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://healthcp-dev.agent.opsera.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 12: DEPLOYMENT LANDSCAPE - MUST BE ABSOLUTE LAST (INV-007)
  # ════════════════════════════════════════════════════════════════════════════
  deployment-landscape:
    name: Update Deployment Landscape
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: success()

    steps:
      - name: Show Deployment Landscape
        run: |
          echo "## 🌐 Deployment Landscape" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| dev | ✅ Deployed | https://healthcp-dev.agent.opsera.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Hub**: ${{ env.HUB_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Spoke**: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant**: ${{ env.TENANT }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment pipeline completed successfully!" >> $GITHUB_STEP_SUMMARY
