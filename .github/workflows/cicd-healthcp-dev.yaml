name: "CI/CD healthcp dev"

on:
  push:
    branches:
      - main
    paths:
      - ".opsera-healthcp/**"
      - "!.opsera-healthcp/k8s/**"
      - "!.opsera-healthcp/argocd/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "nginx.conf"
      - ".github/workflows/cicd-healthcp-dev.yaml"
  workflow_dispatch:

env:
  TENANT: opsera
  APP_NAME: healthcp
  ENV: dev
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-healthcp-dev

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  # Stage 1: Check Bootstrap Prerequisites
  check-bootstrap-prerequisites:
    name: "Check Bootstrap Prerequisites"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.get-ecr.outputs.ecr_uri }}
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: get-ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✅ ECR URI: ${ECR_URI}"

          if ! aws ecr describe-repositories \
              --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" \
              --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "❌ ECR repository not found. Run bootstrap workflow first."
            exit 1
          fi
          echo "✅ ECR repository exists"

      - name: Set Image Tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${{ env.ENV }}-${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Image tag: ${IMAGE_TAG}"

  # Stage 2: Security Scan (parallel with build-image)
  security-scan:
    name: "Security Scan - Gitleaks"
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Report Scan Result
        run: |
          echo "Gitleaks scan completed in warn-only mode"

  # Stage 3: Build Image
  build-image:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    outputs:
      local_image: ${{ steps.build.outputs.local_image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image (Local Only - No Push)
        id: build
        run: |
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.check-bootstrap-prerequisites.outputs.image_tag }}"
          LOCAL_IMAGE="${ECR_URI}:${IMAGE_TAG}"

          docker build \
            -f .opsera-healthcp/Dockerfile \
            -t "${LOCAL_IMAGE}" \
            .

          echo "local_image=${LOCAL_IMAGE}" >> $GITHUB_OUTPUT
          echo "✅ Image built: ${LOCAL_IMAGE}"

  # Stage 4: Grype Container Scan
  grype-scan:
    name: "Grype Container Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Grype Scan
        id: grype
        uses: anchore/scan-action@v3
        with:
          image: ${{ needs.build-image.outputs.local_image }}
          severity-cutoff: high
          fail-build: false
          output-format: sarif
        continue-on-error: true

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
        continue-on-error: true

      - name: Report Grype Result
        run: |
          echo "Grype scan completed in warn-only mode"

  # Stage 5: Push to ECR
  push-to-ecr:
    name: "Push Image to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        id: push
        run: |
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.check-bootstrap-prerequisites.outputs.image_tag }}"
          IMAGE_URI="${ECR_URI}:${IMAGE_TAG}"

          docker build \
            -f .opsera-healthcp/Dockerfile \
            -t "${IMAGE_URI}" \
            .

          docker push "${IMAGE_URI}"

          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "✅ Pushed: ${IMAGE_URI}"

  # Stage 6: Update Manifests
  update-manifests:
    name: "Update Kubernetes Manifests"
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites, push-to-ecr]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Kustomization Image Tag
        run: |
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.check-bootstrap-prerequisites.outputs.image_tag }}"
          OVERLAY_PATH=".opsera-healthcp/k8s/overlays/dev"

          yq eval -i ".images[0].newName = \"${ECR_URI}\"" \
            "${OVERLAY_PATH}/kustomization.yaml"
          yq eval -i ".images[0].newTag = \"${IMAGE_TAG}\"" \
            "${OVERLAY_PATH}/kustomization.yaml"

          echo "✅ Updated ${OVERLAY_PATH}/kustomization.yaml"
          echo "   newName: ${ECR_URI}"
          echo "   newTag:  ${IMAGE_TAG}"

      - name: Validate Kustomize Build
        run: |
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz"
          tar xzf kustomize_v5.3.0_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

          OVERLAY_PATH=".opsera-healthcp/k8s/overlays/dev"
          if ! kustomize build "${OVERLAY_PATH}" > /dev/null 2>&1; then
            echo "❌ Kustomize build validation FAILED"
            kustomize build "${OVERLAY_PATH}"
            exit 1
          fi
          echo "✅ Kustomize build validation passed"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Manifests
        run: |
          IMAGE_TAG="${{ needs.check-bootstrap-prerequisites.outputs.image_tag }}"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "chore: update healthcp dev image to ${IMAGE_TAG} [skip ci]"

          for i in {1..3}; do
            if git push origin ${{ github.ref_name }}; then
              echo "✅ Manifests pushed"
              exit 0
            fi
            echo "Push failed, retrying... ($i/3)"
            if ! git pull --rebase origin ${{ github.ref_name }}; then
              git rebase --abort || true
              git pull --no-rebase origin ${{ github.ref_name }}
            fi
            sleep 2
          done
          exit 1

  # Stage 7: Create ArgoCD App (Idempotent)
  create-argocd-app:
    name: "Create ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Application (Idempotent)
        run: |
          APP_MANIFEST=".opsera-healthcp/argocd/dev/application.yaml"

          if [ ! -f "${APP_MANIFEST}" ]; then
            echo "❌ ArgoCD application manifest not found: ${APP_MANIFEST}"
            exit 1
          fi

          kubectl apply -f "${APP_MANIFEST}"

          if kubectl get app opsera-healthcp-dev -n argocd &>/dev/null; then
            echo "✅ ArgoCD application exists: opsera-healthcp-dev"
          else
            echo "❌ ArgoCD application not found after apply"
            exit 1
          fi

          sleep 3

  # Stage 8: Refresh ECR Secret (SPOKE)
  refresh-ecr-secret:
    name: "Refresh ECR Registry Secret"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Refresh ECR Pull Secret
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          kubectl create secret docker-registry ecr-registry-secret \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ ECR registry secret refreshed in namespace: ${{ env.NAMESPACE }}"

  # Stage 9: ArgoCD Hard Refresh
  argocd-refresh:
    name: "ArgoCD Hard Refresh"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Run Hard Refresh
        run: |
          kubectl patch app opsera-healthcp-dev -n argocd --type merge \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          echo "✅ ArgoCD hard refresh triggered"
          sleep 5

  # Stage 10: ArgoCD Sync
  argocd-sync:
    name: "Sync ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [argocd-refresh, refresh-ecr-secret]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.HUB_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Run ArgoCD Sync
        run: |
          kubectl patch app opsera-healthcp-dev -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD","force":true}}}'
          echo "✅ ArgoCD sync triggered"

      - name: Wait for Sync to Complete
        run: |
          for i in {1..60}; do
            HEALTH=$(kubectl get app opsera-healthcp-dev -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            OPERATION=$(kubectl get app opsera-healthcp-dev -n argocd \
              -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "Unknown")

            echo "[$i/60] Health: ${HEALTH}, Operation: ${OPERATION}"

            if [ "${OPERATION}" = "Succeeded" ] && [ "${HEALTH}" = "Healthy" ]; then
              echo "✅ ArgoCD sync completed successfully"
              exit 0
            fi

            if [ "${OPERATION}" = "Failed" ] || [ "${OPERATION}" = "Error" ]; then
              echo "❌ ArgoCD sync failed: ${OPERATION}"
              kubectl get app opsera-healthcp-dev -n argocd -o yaml
              exit 1
            fi

            sleep 10
          done

          echo "⚠️  Sync did not complete within 10 minutes"
          kubectl get app opsera-healthcp-dev -n argocd -o yaml
          exit 1

  # Stage 11: Verify Deployment (SPOKE)
  verify-deployment:
    name: "Verify Deployment"
    runs-on: ubuntu-latest
    needs: [argocd-sync]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.SPOKE_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Deployment to Exist
        run: |
          for i in {1..60}; do
            if kubectl get deployment healthcp -n ${{ env.NAMESPACE }} &>/dev/null; then
              echo "✅ Deployment exists"
              break
            fi
            echo "⏳ Waiting for ArgoCD to create deployment... ($i/60)"
            sleep 5
          done

          if ! kubectl get deployment healthcp -n ${{ env.NAMESPACE }} &>/dev/null; then
            echo "❌ Deployment not found after 5 minutes"
            exit 1
          fi

      - name: Wait for Deployment Ready
        run: |
          kubectl wait --for=condition=available --timeout=300s \
            deployment/healthcp -n ${{ env.NAMESPACE }}
          echo "✅ Deployment is available"

      - name: Verify Pods Running
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          RUNNING=$(kubectl get pods -n ${{ env.NAMESPACE }} \
            --field-selector=status.phase=Running -o name | wc -l)

          if [ "${RUNNING}" -eq 0 ]; then
            echo "❌ No pods are running"
            exit 1
          fi
          echo "✅ ${RUNNING} pod(s) running"

      - name: Deployment Summary
        run: |
          IMAGE_TAG="${{ needs.check-bootstrap-prerequisites.outputs.image_tag }}"
          echo ""
          echo "=== Deployment Summary ==="
          echo "App:       healthcp"
          echo "Env:       dev"
          echo "Namespace: ${{ env.NAMESPACE }}"
          echo "Image:     ${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}:${IMAGE_TAG}"
          echo "URL:       https://healthcp-dev.agent.opsera.dev"
          echo "=========================="
